# DSphere — netlify.toml

[build]
  publish = "DSphere final/DSphere/frontend"
  command = "echo 'Static site — no build step'"

# Clean URL rewrites
[[redirects]]
  from = "/"
  to   = "/pages/loading.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to   = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/storage"
  to   = "/pages/storage.html"
  status = 200

[[redirects]]
  from = "/messenger"
  to   = "/pages/messenger.html"
  status = 200

[[redirects]]
  from = "/network"
  to   = "/pages/network.html"
  status = 200

[[redirects]]
  from = "/profile"
  to   = "/pages/profile.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to   = "/pages/reset-password.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/pages/admin/admin-dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/threats"
  to   = "/pages/admin/admin-threats.html"
  status = 200

[[redirects]]
  from = "/admin/users"
  to   = "/pages/admin/admin-users.html"
  status = 200

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/pages/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://your-backend.onrender.com; img-src 'self' data: https://firebasestorage.googleapis.com;"
