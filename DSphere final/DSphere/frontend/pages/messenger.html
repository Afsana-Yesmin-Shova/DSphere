<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSphere — Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/variables.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <link rel="stylesheet" href="/css/messenger.css"/>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar__logo">
    <svg viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#00D4FF" stroke-width="1.5" opacity="0.35"/>
      <circle cx="24" cy="24" r="14" stroke="#00D4FF" stroke-width="1.5"/>
      <ellipse cx="24" cy="24" rx="14" ry="6" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
      <line x1="24" y1="10" x2="24" y2="38" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
      <circle cx="24" cy="24" r="3" fill="#00D4FF"/>
    </svg>
    <span class="sidebar__logo-text">DSphere</span>
  </div>
  <nav class="sidebar__nav">
    <span class="nav-section-label">Workspace</span>
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="storage.html" class="nav-item">
      <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none"><path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v2H3V5z" stroke="currentColor" stroke-width="1.4"/><path d="M3 7h14v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" stroke="currentColor" stroke-width="1.4"/></svg>
      <span>Cloud Storage</span>
    </a>
    <a href="messenger.html" class="nav-item active" aria-current="page">
      <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v7a2 2 0 01-2 2H6l-4 3V5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span>Messenger</span>
    </a>
    <a href="network.html" class="nav-item">
      <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="4" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="17" cy="4" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="3" cy="16" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="17" cy="16" r="2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="5" x2="8" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="15" y1="5" x2="12" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="15" x2="8" y2="12" stroke="currentColor" stroke-width="1.2"/><line x1="15" y1="15" x2="12" y2="12" stroke="currentColor" stroke-width="1.2"/></svg>
      <span>Network Suggestor</span>
    </a>
  </nav>
  <div class="sidebar__footer">
    <div class="sidebar__user" onclick="logout()">
      <div class="sidebar__avatar" id="user-avatar">?</div>
      <div class="sidebar__user-info">
        <div class="sidebar__user-name" id="user-name">Loading…</div>
        <div class="sidebar__user-role" id="user-role">user</div>
      </div>
    </div>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main-area">
  <header class="topbar">
    <span class="topbar__title">Messenger</span>
    <div class="topbar__actions">
      <span class="call-badge">
        <svg width="12" height="12" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.4"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Audio/Video calls — coming soon
      </span>
    </div>
  </header>

  <!-- Messenger shell (takes remaining height) -->
  <div class="messenger-shell">

    <!-- ── LEFT: chat list ── -->
    <div class="chat-list-panel" id="chat-list-panel">
      <div class="chat-list-header">
        <span class="chat-list-title">Messages</span>
        <button class="btn btn-accent btn-sm" onclick="openNewChatModal()">+ New</button>
      </div>
      <div class="chat-search">
        <input type="search" placeholder="Search conversations…" oninput="filterChats(this.value)"/>
      </div>
      <div style="display:flex;gap:0;padding:8px 14px 0;border-bottom:1px solid var(--up-border)">
        <button class="chat-tab active" id="tab-dm"    onclick="switchChatTab('dm')">Direct</button>
        <button class="chat-tab"        id="tab-group" onclick="switchChatTab('group')">Groups</button>
      </div>
      <div class="chat-list" id="chat-list">
        <!-- populated by JS -->
        <div style="padding:24px;text-align:center;color:var(--up-muted);font-size:0.82rem" id="chat-list-empty">
          No conversations yet. Start a new one.
        </div>
      </div>
    </div>

    <!-- ── RIGHT: chat window ── -->
    <div class="chat-main" id="chat-main">

      <!-- Empty state (no chat selected) -->
      <div class="no-chat-selected" id="no-chat-selected">
        <div class="no-chat-selected__icon">💬</div>
        <p style="font-size:0.9rem">Select a conversation or start a new one</p>
      </div>

      <!-- Active chat (hidden until a chat is selected) -->
      <div id="active-chat" style="display:none;flex-direction:column;height:100%">

        <!-- Chat header -->
        <div class="chat-header" id="chat-header">
          <div class="chat-header__avatar" id="chat-avatar">?</div>
          <div>
            <div class="chat-header__name"   id="chat-name">—</div>
            <div class="chat-header__status" id="chat-status">—</div>
          </div>
          <div class="chat-header__actions">
            <!-- Audio call (placeholder) -->
            <div style="position:relative">
              <button class="icon-btn disabled" title="Audio call — coming soon" onclick="callPlaceholder('audio')">
                <svg viewBox="0 0 20 20" fill="none"><path d="M3 5.5A1.5 1.5 0 014.5 4h.9a1 1 0 01.95.68l.9 2.7a1 1 0 01-.23 1.02L5.8 9.62a11.05 11.05 0 005.57 5.57l1.22-1.22a1 1 0 011.02-.23l2.7.9a1 1 0 01.69.95v.91A1.5 1.5 0 0115.5 17C8.6 17 3 11.4 3 4.5v-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
              </button>
            </div>
            <!-- Video call (placeholder) -->
            <div style="position:relative">
              <button class="icon-btn disabled" title="Video call — coming soon" onclick="callPlaceholder('video')">
                <svg viewBox="0 0 20 20" fill="none"><path d="M2 7a2 2 0 012-2h8a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V7z" stroke="currentColor" stroke-width="1.4"/><path d="M14 9l4-2v6l-4-2V9z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Typing indicator -->
        <div id="typing-indicator" style="padding:0 20px 6px;font-size:0.72rem;color:var(--up-muted);min-height:20px"></div>

        <!-- Input bar -->
        <div class="chat-input-bar">
          <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message…"
            onkeydown="handleMsgKey(event)"
            oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 20 20" fill="none"><path d="M17 3L3 9l6 2 2 6 6-14z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
        </div>

      </div>
    </div>

  </div><!-- /messenger-shell -->
</div><!-- /main-area -->

<!-- New chat modal -->
<div id="new-chat-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center">
  <div style="background:var(--up-surface);border-radius:14px;padding:28px 30px;max-width:400px;width:90%">
    <h3 style="font-family:'Syne',sans-serif;font-size:1.05rem;color:var(--up-primary);margin-bottom:16px">New Conversation</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:0.78rem;font-weight:500;color:var(--up-primary);display:block;margin-bottom:4px">Type</label>
        <select id="new-chat-type" style="width:100%;padding:9px 12px;border:1.5px solid var(--up-border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:var(--up-bg);color:var(--up-text)" onchange="toggleGroupName()">
          <option value="dm">Direct Message</option>
          <option value="group">Group Chat</option>
        </select>
      </div>
      <div id="group-name-field" style="display:none">
        <label style="font-size:0.78rem;font-weight:500;color:var(--up-primary);display:block;margin-bottom:4px">Group Name</label>
        <input id="new-group-name" type="text" placeholder="e.g. CS Project Team" style="width:100%;padding:9px 12px;border:1.5px solid var(--up-border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:var(--up-bg);color:var(--up-text)"/>
      </div>
      <div>
        <label style="font-size:0.78rem;font-weight:500;color:var(--up-primary);display:block;margin-bottom:4px">Recipient email(s)</label>
        <input id="new-chat-recipients" type="email" placeholder="user@uttarauniversity.edu.bd" style="width:100%;padding:9px 12px;border:1.5px solid var(--up-border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:var(--up-bg);color:var(--up-text)"/>
        <p style="font-size:0.7rem;color:var(--up-muted);margin-top:4px">Separate multiple emails with commas</p>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-ghost" onclick="closeNewChatModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createNewChat()">Start Chat</button>
    </div>
  </div>
</div>

<!-- Call placeholder toast -->
<div id="call-toast" style="display:none;position:fixed;bottom:28px;right:28px;background:var(--up-primary);color:#fff;padding:14px 20px;border-radius:12px;font-size:0.875rem;z-index:300;border-left:4px solid var(--up-accent)"></div>

<script type="module" src="/js/messenger.js"></script>
</body>
</html>
