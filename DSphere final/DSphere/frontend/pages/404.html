<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSphere — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
 
  <style>
    :root {
  --up-bg: #f8fafc;
  --up-surface: #ffffff;
  --up-primary: #0a2540;
  --up-accent: #00d4ff;
  --up-text: #15273f;
  --up-muted: rgba(21, 39, 63, 0.72);
  --up-border: rgba(10, 37, 64, 0.14);
  --up-success: #22c55e;
  --up-error: #e53935;
  --pw-weak: #fb7185;
  --pw-fair: #fbbf24;
  --pw-good: #38bdf8;
  --pw-strong: #22c55e;
}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--up-bg);color:var(--up-text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:.15}
    .bg-orb--1{width:500px;height:500px;background:radial-gradient(circle,#00D4FF,transparent 70%);top:-150px;left:-150px}
    .bg-orb--2{width:400px;height:400px;background:radial-gradient(circle,#0A2540,transparent 70%);bottom:-100px;right:-100px}
    .container{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:480px}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:48px}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--up-primary)}
    .error-code{font-family:'Syne',sans-serif;font-size:7rem;font-weight:800;color:var(--up-primary);line-height:1;opacity:.08;position:absolute;left:50%;transform:translateX(-50%);top:100px;white-space:nowrap}
    .icon{font-size:4rem;margin-bottom:20px;display:block;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--up-primary);margin-bottom:12px}
    p{font-size:.9rem;color:var(--up-muted);line-height:1.7;margin-bottom:28px}
    .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s}
    .btn-primary{background:var(--up-primary);color:#fff;border:none}
    .btn-primary:hover{background:#0d2f52}
    .btn-ghost{background:transparent;color:var(--up-muted);border:1px solid var(--up-border)}
    .btn-ghost:hover{background:var(--up-bg);color:var(--up-primary)}
  </style>
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="container">
    <div class="error-code">404</div>
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#00D4FF" stroke-width="1.5" opacity="0.35"/><circle cx="24" cy="24" r="14" stroke="#00D4FF" stroke-width="1.5"/><ellipse cx="24" cy="24" rx="14" ry="6" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/><line x1="24" y1="10" x2="24" y2="38" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/><circle cx="24" cy="24" r="3" fill="#00D4FF"/></svg>
      <span class="logo-text">DSphere</span>
    </div>
    <span class="icon">🔭</span>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Double-check the URL, or head back to a familiar place.</p>
    <div class="btn-group">
      <a href="dashboard.html" class="btn btn-primary">
        <svg viewBox="0 0 20 20" fill="none" style="width:15px;height:15px"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Go to Dashboard
      </a>
      <a href="index.html" class="btn btn-ghost">Sign In</a>
    </div>
  </div>
</body>
</html>
