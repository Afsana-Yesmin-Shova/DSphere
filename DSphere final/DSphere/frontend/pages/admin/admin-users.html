<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSphere — User Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/admin.css"/>
</head>
<body>

<aside class="admin-sidebar">
  <div class="admin-sidebar__logo">
    <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#00D4FF" stroke-width="1.5" opacity="0.4"/><circle cx="24" cy="24" r="14" stroke="#00D4FF" stroke-width="1.5"/><ellipse cx="24" cy="24" rx="14" ry="6" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/><line x1="24" y1="10" x2="24" y2="38" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/><circle cx="24" cy="24" r="3" fill="#00D4FF"/></svg>
    <span class="admin-sidebar__logo-text">DSphere</span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <nav class="admin-sidebar__nav">
    <span class="a-nav-label">SOC Overview</span>
    <a href="admin-dashboard.html" class="a-nav-item">
      <svg class="a-nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="admin-threats.html" class="a-nav-item">
      <svg class="a-nav-icon" viewBox="0 0 20 20" fill="none"><path d="M10 2l8 4v5c0 4.4-3.4 8.5-8 9.5C5.4 19.5 2 15.4 2 11V6l8-4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span>Threat Monitor</span>
    </a>
    <a href="admin-users.html" class="a-nav-item active" aria-current="page">
      <svg class="a-nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 17c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M14 5a3 3 0 010 6M17 17c0-2.2-1.5-4-4-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>User Management</span>
    </a>
    <span class="a-nav-label" style="margin-top:8px">System</span>
    <a href="../dashboard.html" class="a-nav-item">
      <svg class="a-nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 10h14M10 3l7 7-7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>User View</span>
    </a>
  </nav>
  <div class="admin-sidebar__footer">
    <div class="admin-user-row">
      <div class="admin-avatar" id="admin-avatar-side">A</div>
      <div><div class="admin-user-name" id="admin-name-side">Admin</div><div class="admin-user-role">SYSTEM ADMIN</div></div>
      <button class="logout-btn" onclick="logout()">Out</button>
    </div>
  </div>
</aside>

<div class="admin-main">
  <header class="admin-topbar">
    <span class="admin-topbar__title">User Management</span>
    <div style="display:flex;gap:10px">
      <input class="a-input" type="search" id="user-search" placeholder="Search users…" style="width:220px" oninput="filterUsers(this.value)"/>
      <select class="a-input" id="role-filter" onchange="filterUsers(document.getElementById('user-search').value)">
        <option value="">All roles</option>
        <option value="admin">Admins</option>
        <option value="user">Users</option>
      </select>
      <button class="a-btn a-btn-ghost a-btn-sm" onclick="loadUsers()">
        <svg viewBox="0 0 20 20" fill="none" style="width:13px;height:13px"><path d="M4 10a6 6 0 1012 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M4 10l-2-2m2 2l2-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <div class="admin-content">

    <!-- summary row -->
    <div class="admin-stats" style="grid-template-columns:repeat(3,1fr);max-width:700px;margin-bottom:20px">
      <div class="a-stat info">
        <div class="a-stat__label">Total Users</div>
        <div class="a-stat__value" id="u-total">—</div>
      </div>
      <div class="a-stat success">
        <div class="a-stat__label">Active</div>
        <div class="a-stat__value" id="u-active">—</div>
      </div>
      <div class="a-stat critical">
        <div class="a-stat__label">Suspended</div>
        <div class="a-stat__value" id="u-suspended">—</div>
      </div>
    </div>

    <div class="a-panel">
      <div class="a-panel__header">
        <div class="a-panel__title"><span class="a-panel__title-dot" style="background:var(--a-success)"></span>All Users</div>
        <span id="user-count-label" style="font-size:0.72rem;color:var(--a-muted)"></span>
      </div>
      <div class="a-panel__body">
        <table class="a-table" id="user-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Verified</th>
              <th>Status</th>
              <th>Storage</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="user-tbody">
            <tr><td colspan="7"><div class="a-empty"><div class="a-loading"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Role change modal -->
<div class="a-modal-overlay" id="role-modal" style="display:none">
  <div class="a-modal">
    <h3>Change Role</h3>
    <p id="role-modal-msg">Select the new role for this user.</p>
    <select class="a-input" id="role-select" style="width:100%;margin-bottom:20px">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="a-btn a-btn-ghost" onclick="document.getElementById('role-modal').style.display='none'">Cancel</button>
      <button class="a-btn a-btn-accent" id="role-confirm-btn">Save Role</button>
    </div>
  </div>
</div>

<!-- Confirm action modal -->
<div class="a-modal-overlay" id="confirm-modal" style="display:none">
  <div class="a-modal">
    <h3 id="confirm-title">Confirm</h3>
    <p  id="confirm-msg"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="a-btn a-btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="a-btn a-btn-danger" id="confirm-btn">Confirm</button>
    </div>
  </div>
</div>

<div id="a-toast" style="position:fixed;bottom:24px;right:24px;background:var(--a-surface);border:1px solid var(--a-border);color:var(--a-text);padding:12px 20px;border-radius:10px;font-size:0.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;max-width:340px"></div>

<script src="../../js/admin.js"></script>
<script>
// Users page extras
let allUsersData = [];
function filterUsers(q) {
  const role = document.getElementById('role-filter')?.value || '';
  const ql = q.toLowerCase();
  const filtered = allUsersData.filter(u =>
    (!ql || u.name?.toLowerCase().includes(ql) || u.email?.toLowerCase().includes(ql)) &&
    (!role || u.role === role)
  );
  renderUserTable(filtered);
}
// Override renderUserRows to also save allUsersData
const _origLoadUsers = window.loadUsers;
</script>
</body>
</html>
