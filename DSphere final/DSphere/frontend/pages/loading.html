<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSphere — Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A2540;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif}
    .splash{text-align:center}
    .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
    .logo-text{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-.02em}
    .logo svg{animation:rotate 20s linear infinite}
    @keyframes rotate{to{transform:rotate(360deg)}}
    .loader{width:40px;height:40px;border:3px solid rgba(0,212,255,.2);border-top-color:#00D4FF;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-size:.85rem;color:rgba(255,255,255,.4);letter-spacing:.02em}
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="#00D4FF" stroke-width="1.5" opacity="0.4"/>
        <circle cx="24" cy="24" r="14" stroke="#00D4FF" stroke-width="1.5"/>
        <ellipse cx="24" cy="24" rx="14" ry="6" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
        <line x1="24" y1="10" x2="24" y2="38" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
        <circle cx="24" cy="24" r="3" fill="#00D4FF"/>
      </svg>
      <span class="logo-text">DSphere</span>
    </div>
    <div class="loader"></div>
    <div class="msg">Initialising secure environment…</div>
  </div>
  <script>
    // Redirect after verifying session
    setTimeout(() => {
      const token = sessionStorage.getItem('dsphere_access');
      window.location.href = token ? 'dashboard.html' : 'index.html';
    }, 800);
  </script>
</body>
</html>
